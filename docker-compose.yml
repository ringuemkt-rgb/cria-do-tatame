version: "3.9"

name: visao-de-cria

services:
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: visao_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-visaodecria}
      POSTGRES_USER: ${POSTGRES_USER:-visaouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-visaopass}
      TZ: ${TZ:-UTC}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-visaouser} -d ${POSTGRES_DB:-visaodecria}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  redis:
    image: redis:7.2.5-alpine
    container_name: visao_redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2026-03-27T17-42-41Z
    container_name: visao_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visao_backend
    env_file:
      - .env
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-visaouser}:${POSTGRES_PASSWORD:-visaopass}@postgres:5432/${POSTGRES_DB:-visaodecria}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 15s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visao_worker
    env_file:
      - .env
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-visaouser}:${POSTGRES_PASSWORD:-visaopass}@postgres:5432/${POSTGRES_DB:-visaodecria}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.worker.celery_app worker --loglevel=INFO --without-gossip --without-mingle
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: visao_frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/live}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 20s
      timeout: 5s
      retries: 8
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
