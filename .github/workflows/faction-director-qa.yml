name: Faction Director QA

on:
  push:
    paths:
      - "data/factions/**"
      - "data/world/faction_territories_v3.json"
      - "src/autoloads/FactionManager.gd"
      - "src/autoloads/FactionDirectorV3.gd"
      - "src/compat/FactionSaveMigrationV3.gd"
      - "src/autoloads/FactionAIPlanBridge.gd"
      - "src/autoloads/CriaLiveManager.gd"
      - "src/autoloads/SaveManager.gd"
      - "src/autoloads/SignalBus.gd"
      - "tests/test_faction_director_data.py"
      - "tests/faction_director_smoke.gd"
      - "tools/lint_canon_v4.py"
      - "project.godot"
  pull_request:
    paths:
      - "data/factions/**"
      - "data/world/faction_territories_v3.json"
      - "src/autoloads/FactionManager.gd"
      - "src/autoloads/FactionDirectorV3.gd"
      - "src/compat/FactionSaveMigrationV3.gd"
      - "src/autoloads/FactionAIPlanBridge.gd"
      - "src/autoloads/CriaLiveManager.gd"
      - "src/autoloads/SaveManager.gd"
      - "src/autoloads/SignalBus.gd"
      - "tests/test_faction_director_data.py"
      - "tests/faction_director_smoke.gd"
      - "tools/lint_canon_v4.py"
      - "project.godot"

jobs:
  faction-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - run: python tools/lint_canon_v4.py
      - run: pytest -q tests/test_faction_director_data.py tests/test_v4_integration_contract.py
      - run: python tools/cria_forge/cria_forge.py validate

  faction-godot-smoke:
    needs: faction-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Godot 4.2.2 compatibility gate
        run: |
          curl -L --fail --retry 3 \
            -o godot.zip \
            https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q godot.zip
          mv Godot_v4.2.2-stable_linux.x86_64 godot
          chmod +x godot
      - name: Prepare logs
        run: mkdir -p reports/faction_director
      - name: Import and parse
        shell: bash
        run: |
          set -o pipefail
          timeout 180 ./godot --headless --editor --path . --import 2>&1 | tee reports/faction_director/import.log
      - name: Run faction simulation smoke
        shell: bash
        run: |
          set -o pipefail
          ./godot --headless --path . --script res://tests/faction_director_smoke.gd 2>&1 | tee reports/faction_director/smoke.log
      - name: Upload faction logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faction-director-logs
          path: reports/faction_director/
          if-no-files-found: warn
