name: Apply Faction Strict Types

on:
  pull_request:
    branches:
      - main
    paths:
      - "tools/fix_faction_strict_types.py"
      - ".github/workflows/faction-strict-type-fix.yml"

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply deterministic replacements
        run: python tools/fix_faction_strict_types.py
      - name: Commit generated fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/autoloads/WorldDirectorManager.gd \
                  src/autoloads/FactionDirectorManager.gd \
                  src/autoloads/RivalAIManager.gd \
                  src/combat/DaviAIController.gd \
                  tests/faction_director_smoke.gd
          git commit -m "fix(factions): resolver tipagem estrita do Godot"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
