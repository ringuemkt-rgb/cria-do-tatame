<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="Cria do Tatame — RPG tático de Jiu-Jitsu Brasileiro, carreira, Cria Live e mundo vivo." />
  <title>CRIA DO TATAME</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <noscript>Ative JavaScript para jogar Cria do Tatame.</noscript>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand-mark" aria-hidden="true">🦍</div>
      <div class="brand-text">
        <strong>CRIA DO TATAME</strong>
        <span>De cria pra cria • Luta • Disciplina • Evolução</span>
      </div>
      <button id="installBtn" class="ghost small" hidden>Instalar</button>
    </header>

    <main id="app" class="app" role="main" aria-live="polite">
      <section class="panel loading-panel">
        <h1>Carregando o Terreiro...</h1>
        <p>Preparando tatame, ficha de Ruan Macacão e Cria Live.</p>
      </section>
    </main>

    <footer class="bottombar">
      <button data-nav="hub">Hub</button>
      <button data-nav="train">Treino</button>
      <button data-nav="combat">Luta</button>
      <button data-nav="live">Cria Live</button>
      <button data-nav="save">Salvar</button>
    </footer>
  </div>

  <script src="./game.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
